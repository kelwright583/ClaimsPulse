[build]
  command = "rm -rf node_modules .next package-lock.json && npm install && npx prisma generate && next build"
  publish = ".next"

[functions]
  node_bundler = "nft"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[edge_functions]]
  function = "no-durable-cache"
  path = "/*"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"

[functions."mailbox-poll"]
  schedule = "*/2 * * * *"
